name: Publish MCP Package

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to test in dry-run"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
  release:
    types:
      - published
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-mcp:
    name: Publish twincat-mcp
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'mcp-v') }}
    runs-on: ubuntu-latest
    env:
      NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Validate MCP version tag
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s\n' "$TAG_NAME" | grep -Eq '^mcp-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Expected an MCP version tag like mcp-v0.1.0 or mcp-v0.1.0-next.0, got: $TAG_NAME" >&2
            exit 1
          fi

          TAG_VERSION="${TAG_NAME#mcp-v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/mcp/package.json', 'utf8')).version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "MCP tag version $TAG_VERSION does not match packages/mcp/package.json version $PACKAGE_VERSION." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify core dependency is published
        run: |
          CORE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/mcp/package.json', 'utf8')).dependencies['twincat-mcp-core']")"
          npm view "twincat-mcp-core@${CORE_VERSION}" version

      - name: Check whether MCP version is already published
        id: published
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/mcp/package.json', 'utf8')).version")"

          if npm view "twincat-mcp@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "twincat-mcp@${PACKAGE_VERSION} is already published; the publish step will be skipped."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check workspace integration
        run: npm run check:workspace

      - name: Typecheck
        run: npm run check

      - name: Test core and MCP packages
        run: npm run test:core && npm run test:mcp

      - name: Build
        run: npm run build

      - name: Pack core and MCP packages
        run: npm run pack:core && npm run pack:mcp

      - name: Dry-run publish MCP package
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm publish -w twincat-mcp --tag "$NPM_TAG" --access public --dry-run

      - name: Publish MCP package
        if: ${{ github.event_name != 'workflow_dispatch' && steps.published.outputs.published != 'true' }}
        run: npm publish -w twincat-mcp --tag "$NPM_TAG" --access public --provenance
